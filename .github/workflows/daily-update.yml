name: 每日更新指数增强基金排名

on:
  schedule:
    # 北京时间每个交易日 18:00 (UTC 10:00)，确保收盘数据已出
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复数据缓存
        uses: actions/cache@v4
        id: cache-data
        with:
          path: data/
          key: fund-data-v2-${{ github.run_number }}
          restore-keys: |
            fund-data-v2-

      - name: [1/4] 更新基金池
        run: python 01_build_fund_pool1.py
        continue-on-error: true

      - name: [2/4] 获取最新净值
        run: python 02_update_nav.py
        continue-on-error: true

      - name: [3/4] 计算涨跌幅与超额
        run: python 03_calculate_return.py

      - name: [4/6] 生成绩效 HTML
        run: python 04_generate_html.py

      - name: [5/6] 生成研究分析 Excel
        run: python 05_export_analysis.py
        continue-on-error: true

      - name: [6/6] 生成研究 HTML 看板
        run: python 06_generate_research_html.py
        continue-on-error: true

      - name: 验证数据日期
        run: |
          python -c "
          import pandas as pd, os, sys
          from datetime import datetime, timedelta
          path = 'data/return/excess_return.parquet'
          if not os.path.exists(path):
              print('[WARN] excess_return.parquet 不存在')
              sys.exit(0)
          df = pd.read_parquet(path)
          latest = pd.to_datetime(df['date'].max()).date()
          today = datetime.now().date()
          print(f'数据日期: {latest}')
          print(f'当前日期: {today}')
          # 允许 1 个交易日的延迟（周末/节假日）
          diff = (today - latest).days
          if diff > 3:
              print(f'[WARN] 数据延迟 {diff} 天，可能缺少最新交易日数据')
          else:
              print('[OK] 数据为近期数据')
          "

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: output/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
