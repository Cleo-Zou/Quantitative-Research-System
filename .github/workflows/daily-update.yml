name: 每日更新指数增强基金排名

on:
  schedule:
    # 北京时间次日 07:00 (UTC 23:00) 周二~周六，确保前一个交易日净值已公布完毕
    # 天天基金净值通常在当晚 18:00-22:00 陆续公布，次日清晨一定可用
    - cron: "0 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复数据缓存
        uses: actions/cache@v4
        id: cache-data
        with:
          path: |
            data/nav/
            data/index/
            data/fund_master.parquet
            data/fund_detail_cache.parquet
            data/fund_return.parquet
          key: fund-data-v3-${{ runner.os }}-${{ github.run_date }}
          restore-keys: |
            fund-data-v3-${{ runner.os }}-

      - name: 01 更新基金池
        run: python 01_build_fund_pool1.py
        continue-on-error: true

      - name: 02 获取最新净值
        run: python 02_update_nav.py
        continue-on-error: true

      - name: 03 计算涨跌幅与超额
        run: python 03_calculate_return.py

      - name: 04 生成绩效 HTML
        run: python 04_generate_html.py

      - name: 05 生成研究分析 Excel
        run: python 05_export_analysis.py
        continue-on-error: true

      - name: 06 生成研究 HTML 看板
        run: python 06_generate_research_html.py
        continue-on-error: true

      - name: 验证数据日期
        run: |
          python -c "
          import pandas as pd, os, sys
          from datetime import datetime, timedelta
          path = 'data/return/excess_return.parquet'
          if not os.path.exists(path):
              print(f'[FATAL] {path} 不存在，数据流水线可能失败')
              sys.exit(1)
          df = pd.read_parquet(path)
          latest = pd.to_datetime(df['date'].max()).date()
          today = datetime.now().date()
          print(f'数据日期: {latest}')
          print(f'当前日期: {today}')
          diff = (today - latest).days
          # 容忍 ≤3 自然日延迟（覆盖周末 & 1天节假日缓冲）
          # 例如: 周五数据 → 周一 holiday → 周二 cron (UTC Mon) diff=3 → 仅警告
          if diff > 3:
              print(f'[FATAL] 数据延迟 {diff} 天（>3），拒绝部署陈旧数据')
              print(f'  当前 UTC 日期: {today}')
              print(f'  最新数据日期: {latest}')
              print(f'  可能原因: API 数据源异常 / 长时间假期 / 上游流水线失败')
              sys.exit(1)
          elif diff > 2:
              print(f'[WARN] 数据延迟 {diff} 天（容忍范围内，继续部署）')
          else:
              print('[OK] 数据为近期数据')
          "

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: output/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
